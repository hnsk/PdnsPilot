version: "3.9"

services:
  pdns-rustadmin:
    build: .
    image: pdns-rustadmin:latest
    container_name: pdns-rustadmin
    restart: unless-stopped
    ports:
      - "8080:8080"
    volumes:
      - pdns-data:/data
    environment:
      POWERADMIN_SECRET_KEY: ${POWERADMIN_SECRET_KEY:?Set POWERADMIN_SECRET_KEY in .env}
      POWERADMIN_DATABASE_PATH: /data/poweradmin.db
      POWERADMIN_SESSION_LIFETIME_HOURS: ${POWERADMIN_SESSION_LIFETIME_HOURS:-8}
      POWERADMIN_DEFAULT_ADMIN_PASSWORD: ${POWERADMIN_DEFAULT_ADMIN_PASSWORD:-admin}
      BIND_ADDR: 0.0.0.0:8080
      RUST_LOG: ${RUST_LOG:-pdns_rustadmin=info,tower_http=info}

volumes:
  pdns-data:
    driver: local
