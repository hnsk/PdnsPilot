services:
  pdnspilot:
    build: .
    image: pdnspilot:latest
    container_name: pdnspilot
    restart: unless-stopped
    ports:
      - "8080:8080"
    volumes:
      - pdns-data:/data
    environment:
      PDNSPILOT_SECRET_KEY: ${PDNSPILOT_SECRET_KEY:?Set PDNSPILOT_SECRET_KEY in .env}
      PDNSPILOT_DATABASE_PATH: /data/pdnspilot.db
      PDNSPILOT_SESSION_LIFETIME_HOURS: ${PDNSPILOT_SESSION_LIFETIME_HOURS:-8}
      PDNSPILOT_DEFAULT_ADMIN_PASSWORD: ${PDNSPILOT_DEFAULT_ADMIN_PASSWORD:-admin}
      BIND_ADDR: 0.0.0.0:8080
      RUST_LOG: ${RUST_LOG:-pdnspilot=info,tower_http=info}

volumes:
  pdns-data:
    driver: local
