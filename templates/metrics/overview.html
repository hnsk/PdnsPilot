{% extends "base.html" %}
{% block title %}Metrics - PowerAdmin{% endblock %}
{% block content %}
<div class="page-header">
    <h1>Metrics</h1>
</div>

{% if servers %}
<div class="grid-3">
    {% for srv in servers %}
    <a href="/metrics/{{ srv.id }}" style="text-decoration:none;">
        <div class="card" style="cursor:pointer; transition: border-color 0.15s;" onmouseover="this.style.borderColor='var(--primary)'" onmouseout="this.style.borderColor='var(--border)'">
            <div class="card-body" style="text-align:center; padding: 2rem;">
                <div style="font-size: 1.1rem; font-weight: 700; color: var(--primary);">{{ srv.name }}</div>
                <div class="text-dim text-sm mt-1">View Metrics</div>
            </div>
        </div>
    </a>
    {% endfor %}
</div>
{% else %}
<div class="card">
    <div class="empty-state">No active servers configured.</div>
</div>
{% endif %}
{% endblock %}
