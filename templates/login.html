{% extends "base.html" %}
{% block title %}Login - PdnsPilot{% endblock %}
{% block content %}
<div style="max-width: 400px; margin: 4rem auto;">
    <div class="card">
        <div class="card-header">
            <div class="brand" style="display: flex; align-items: center; gap: 0.5rem;">
                <svg viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg" style="width:32px;height:32px">
                    <circle cx="32" cy="32" r="30" fill="#1e40af"/>
                    <circle cx="32" cy="32" r="22" fill="none" stroke="white" stroke-width="3.5"/>
                    <circle cx="32" cy="32" r="7" fill="none" stroke="white" stroke-width="3.5"/>
                    <circle cx="32" cy="32" r="2.5" fill="white"/>
                    <line x1="32" y1="25" x2="32" y2="10" stroke="white" stroke-width="3.5" stroke-linecap="round"/>
                    <line x1="38.06" y1="28.5" x2="51.05" y2="21" stroke="white" stroke-width="3.5" stroke-linecap="round"/>
                    <line x1="38.06" y1="35.5" x2="51.05" y2="43" stroke="white" stroke-width="3.5" stroke-linecap="round"/>
                    <line x1="32" y1="39" x2="32" y2="54" stroke="white" stroke-width="3.5" stroke-linecap="round"/>
                    <line x1="25.94" y1="35.5" x2="12.95" y2="43" stroke="white" stroke-width="3.5" stroke-linecap="round"/>
                    <line x1="25.94" y1="28.5" x2="12.95" y2="21" stroke="white" stroke-width="3.5" stroke-linecap="round"/>
                    <circle cx="32" cy="10" r="4" fill="white"/>
                    <circle cx="51.05" cy="21" r="4" fill="white"/>
                    <circle cx="51.05" cy="43" r="4" fill="white"/>
                    <circle cx="32" cy="54" r="4" fill="white"/>
                    <circle cx="12.95" cy="43" r="4" fill="white"/>
                    <circle cx="12.95" cy="21" r="4" fill="white"/>
                </svg>
                PdnsPilot Login
            </div>
        </div>
        <div class="card-body" x-data="{ username: '', password: '', error: '', loading: false }">
            {% if error %}
            <div class="flash flash-error">{{ error }}</div>
            {% endif %}
            <template x-if="error">
                <div class="flash flash-error" x-text="error"></div>
            </template>
            <form @submit.prevent="
                loading = true; error = '';
                fetch('/api/login', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({username, password})
                }).then(r => {
                    if (r.ok) { window.location.href = '/'; }
                    else { r.json().then(d => { error = d.detail || 'Login failed'; loading = false; }); }
                }).catch(() => { error = 'Connection error'; loading = false; });
            ">
                <div class="form-group">
                    <label>Username</label>
                    <input type="text" x-model="username" required autofocus>
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" x-model="password" required>
                </div>
                <button type="submit" class="btn btn-primary" style="width:100%" :disabled="loading">
                    <span x-show="!loading">Sign In</span>
                    <span x-show="loading">Signing in...</span>
                </button>
            </form>
        </div>
    </div>
</div>
{% endblock %}
