{% extends "base.html" %}
{% block title %}{{ target_user.username }} - PdnsPilot{% endblock %}
{% block content %}
<div class="page-header">
    <h1>{{ target_user.username }}</h1>
    <a href="/users" class="btn">&larr; Users</a>
</div>

<div class="grid-2" x-data="userDetail()">
    <!-- User Settings -->
    <div class="card">
        <div class="card-header">Account Settings</div>
        <div class="card-body">
            <div class="form-group">
                <label>Role</label>
                <select x-model="role">
                    <option value="operator">Operator</option>
                    <option value="admin">Admin</option>
                </select>
            </div>
            <div class="form-group">
                <label>Status</label>
                <select x-model="isActive">
                    <option :value="true">Active</option>
                    <option :value="false">Inactive</option>
                </select>
            </div>
            <div class="form-group">
                <label>New Password (leave blank to keep current)</label>
                <input type="password" x-model="password" autocomplete="new-password">
            </div>
            <button class="btn btn-primary" @click="saveUser()" :disabled="saving" x-text="saving ? 'Saving…' : 'Save Changes'"></button>
        </div>
    </div>

    <!-- Zone Assignments -->
    <div class="card">
        <div class="card-header">
            <span>Zone Assignments</span>
            <span x-show="zonesDirty" style="font-size:0.75rem; color: var(--warning); font-weight:600;">&#9679; Unsaved changes</span>
            <button class="btn btn-sm btn-primary" @click="showAddZone=true">+ Add</button>
        </div>
        <div style="max-height: 400px; overflow-y: auto;">
            <table>
                <thead>
                    <tr><th>Zone</th><th>Server</th><th></th></tr>
                </thead>
                <tbody>
                    <template x-for="(az, i) in assignedZones" :key="i">
                    <tr>
                        <td class="mono text-sm" x-text="az.zone_name"></td>
                        <td class="text-sm text-dim" x-text="az.server_name"></td>
                        <td>
                            <button class="btn btn-danger btn-sm" @click="removeZone(i)">Remove</button>
                        </td>
                    </tr>
                    </template>
                    <tr x-show="assignedZones.length === 0">
                        <td colspan="3" class="empty-state" style="padding: 1.5rem;">No zones assigned.</td>
                    </tr>
                </tbody>
            </table>
        </div>
        <div class="card-body" style="border-top: 1px solid var(--border);">
            <button class="btn btn-sm" :class="zonesDirty ? 'btn-warning' : 'btn-primary'" @click="saveZones()">Save Zone Assignments</button>
        </div>
    </div>
</div>

<!-- Add Zone Panel -->
<div class="card mt-2" x-data="userDetail()" x-show="false" id="add-zone-panel"
    x-data="{ showAddZone: false }" style="display:none!important">
</div>

<!-- Add Zone Modal (inside userDetail x-data scope) -->
<div id="add-zone-modal" class="modal-overlay" style="display:none"
    @click.self="document.getElementById('add-zone-modal').style.display='none'"
    x-data="addZoneModal()">
    <div class="modal" style="max-width: 520px;">
        <div class="modal-header">
            <span>Add Zone Assignment</span>
            <button class="btn btn-sm" @click="document.getElementById('add-zone-modal').style.display='none'">&times;</button>
        </div>
        <div class="modal-body">
            <div class="form-group">
                <label>Server</label>
                <select x-model="selectedServer" @change="selectedZone=''">
                    <option value="">Select server...</option>
                    {% for srv in servers_with_zones %}
                    <option value="{{ srv.id }}">{{ srv.name }}</option>
                    {% endfor %}
                </select>
            </div>
            <div class="form-group" x-show="selectedServer">
                <label>Zone</label>
                <select x-model="selectedZone">
                    <option value="">Select zone...</option>
                    <template x-for="z in zonesForServer()" :key="z">
                        <option :value="z" x-text="z"></option>
                    </template>
                </select>
            </div>
        </div>
        <div class="modal-footer">
            <button type="button" class="btn" @click="document.getElementById('add-zone-modal').style.display='none'">Cancel</button>
            <button class="btn btn-primary" @click="add()" :disabled="!selectedServer || !selectedZone">Add</button>
        </div>
    </div>
</div>

<script>
const SERVERS_WITH_ZONES = {{ servers_with_zones | tojson }};
const INITIAL_ZONES = {{ assigned_zones | tojson }};
const TARGET_USER_ID = {{ target_user.id }};

function userDetail() {
    return {
        role: {{ target_user.role | tojson }},
        isActive: {{ target_user.is_active | tojson }},
        password: '',
        assignedZones: JSON.parse(JSON.stringify(INITIAL_ZONES)),
        zonesDirty: false,
        saving: false,

        async saveUser() {
            this.saving = true;
            try {
                const body = { role: this.role, is_active: this.isActive };
                if (this.password) body.password = this.password;
                const r = await fetch(`/api/users/${TARGET_USER_ID}`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(body)
                });
                if (r.ok) { this.password = ''; showToast('User saved'); }
                else r.json().then(d => showToast(d.detail || 'Error', 'error'));
            } finally {
                this.saving = false;
            }
        },

        removeZone(i) {
            this.assignedZones.splice(i, 1);
            this.zonesDirty = true;
        },

        async saveZones() {
            const payload = this.assignedZones.map(a => ({
                zone_name: a.zone_name,
                pdns_server_id: a.pdns_server_id
            }));
            const r = await fetch(`/api/users/${TARGET_USER_ID}/zones`, {
                method: 'PUT',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            });
            if (r.ok) { showToast('Zones saved'); this.zonesDirty = false; }
            else r.json().then(d => showToast(d.detail || 'Error', 'error'));
        }
    };
}

function addZoneModal() {
    return {
        selectedServer: '',
        selectedZone: '',

        zonesForServer() {
            if (!this.selectedServer) return [];
            const srv = SERVERS_WITH_ZONES.find(s => s.id == this.selectedServer);
            return srv ? srv.zones : [];
        },

        add() {
            if (!this.selectedServer || !this.selectedZone) return;
            // Find the Alpine component for userDetail and add the zone
            const userComp = document.querySelector('[x-data*="userDetail"]');
            if (userComp && userComp._x_dataStack) {
                const data = userComp._x_dataStack[0];
                const srvId = parseInt(this.selectedServer);
                const srvName = (SERVERS_WITH_ZONES.find(s => s.id == srvId) || {}).name || 'Unknown';
                data.assignedZones.push({ zone_name: this.selectedZone, pdns_server_id: srvId, server_name: srvName });
                data.zonesDirty = true;
            }
            document.getElementById('add-zone-modal').style.display = 'none';
            this.selectedServer = ''; this.selectedZone = '';
        }
    };
}
</script>

<style>
.grid-2 [x-data] button.btn-primary.btn-sm[\\@click*="showAddZone"] { display: inline-flex; }
</style>

<!-- Wire up "Add" button to modal -->
<script>
document.addEventListener('DOMContentLoaded', function() {
    // The "Add" button in card-header opens the modal
    document.querySelectorAll('.card-header .btn-primary').forEach(function(btn) {
        if (btn.textContent.trim() === '+ Add') {
            btn.addEventListener('click', function() {
                document.getElementById('add-zone-modal').style.display = 'flex';
            });
        }
    });
});
</script>
{% endblock %}
